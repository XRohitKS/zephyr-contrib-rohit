# Hardware Support
CONFIG_PWM=y
CONFIG_GPIO=y

# --- Console & Printing ---
CONFIG_PRINTK=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# --- Printk Optimizations ---
CONFIG_CBPRINTF_NANO=y
CONFIG_CBPRINTF_REDUCED_INTEGRAL=y

# --- RAM OPTIMIZATIONS (CRITICAL) ---
CONFIG_MINIMAL_LIBC=y
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=200
CONFIG_MAIN_STACK_SIZE=384
CONFIG_IDLE_STACK_SIZE=64
CONFIG_ISR_STACK_SIZE=160

# --- ROM OPTIMIZATIONS ---
CONFIG_UART_INTERRUPT_DRIVEN=n
CONFIG_BOOT_BANNER=n
CONFIG_ASSERT=n
CONFIG_ERRNO=n
CONFIG_THREAD_NAME=n
